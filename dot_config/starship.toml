add_newline = false
command_timeout = 2000

format = """
[оӮ¶](fg:#7aa2f7)\
$os\
[оӮ° ](fg:#7aa2f7 bg:#1a1b26)\
$directory\
$git_branch\
$git_status\
$git_metrics\
[оӮ°](fg:#1a1b26)\
$fill\
$docker_context\
$nodejs\
$ruby\
$cmd_duration\
$time\
\n$character\
"""

[character]
success_symbol = '[вқҜ](bold #9ece6a)'
error_symbol = '[вң—](bold red)'

[os]
disabled = false
style = "fg:#1a1b26 bg:#7aa2f7"
format = "[$symbol]($style)"

[os.symbols]
Macos = " п…№ "
Linux = " пҢҡ "
Ubuntu = " пҢӣ "

[directory]
truncation_length = 6
truncation_symbol = 'пҒј ' # nf-fa-folder_open
truncate_to_repo = false
home_symbol = 'оҳ— ~' # nf-costum-home
style = 'fg:#7aa2f7 bg:#1a1b26'
read_only = ' у°Ңҫ ' # nf-md-lock
read_only_style = 'fg:#f7768e bg:#1a1b26'
format = '[$path]($style)[$read_only]($read_only_style)'

[git_branch]
symbol = 'п„“ п„Ұ ' # nf-fa-github_alt, nf-fa-code_fork
truncation_length = 20
truncation_symbol = '...'
style = 'fg:#7aa2f7 bg:#1a1b26'
format = '[ оӮұ $symbol$branch(:$remote_branch)]($style)'

[git_status]
style = 'fg:#e0af68 bg:#1a1b26'
conflicted = '='
ahead = 'вҮЎ${count}'
behind = 'вҮЈ${count}'
diverged = 'вҮ•'
up_to_date = 'вң“'
untracked = '?'
stashed = '\$'
modified = '!${count}'
renamed = 'В»'
deleted = 'вңҳ'
format = '([\[$all_status$ahead_behind\]]($style))'

[git_metrics]
added_style = 'fg:#9ece6a bg:#1a1b26'
deleted_style = 'fg:#9ece6a bg:#1a1b26'
format = '[+$added/-$deleted]($deleted_style)'
disabled = false

[fill]
symbol = 'в”Җ'
style = 'blue'

# 2жһҡзӣ®гҒ®гҖҢрҹҗі colimaгҖҚзӣёеҪ“
[docker_context]
symbol = "пҢҲ " # nf-linux-docker
style = "fg:#9ece6a"
format = "[ оӮі $symbol$context]($style)"
only_with_files = false

# гҖҢvia v22.22.0гҖҚзӣёеҪ“пјҲnodeпјү
[nodejs]
symbol = "в¬ў " # гҒҠеҘҪгҒҝгҒ§
style = "fg:#9ece6a"
format = "[ оӮі $symbol$version]($style)"

# гҖҢvia v3.4.8гҖҚзӣёеҪ“пјҲrubyжғіе®ҡпјү
[ruby]
symbol = "рҹ’Һ "
style = "fg:#7aa2f7"
format = "[ оӮі $symbol$version]($style)"

[cmd_duration]
min_time = 1
style = 'fg:#e0af68'
format = "[ оӮі оҺӮ $duration]($style)"

[time]
disabled = false
style = 'fg:#73daca'
format = '[ оӮі пҖ— $time]($style)'
time_format = '%T'
utc_time_offset = '+9'
